<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Schooly Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="TopHeader">
    <h1>Schooly Admin</h1>
</div>

<section class="download-section">
    <div class="admin-panel">
        <div class="form-block">
            <h2>Upload</h2>

            <div id="upload-message"></div>

            <form action="/upload" method="POST" enctype="multipart/form-data" class="login-form">
                <label for="htmlFile">Choose HTML file</label>
                <input type="file" id="htmlFile" name="htmlFile" accept=".html" required>
                <button type="submit">Upload</button>
            </form>
        </div>

        <div class="form-block">
            <h2>Slet filer</h2>
            <div id="admin-file-list"></div>
        </div>

        <form action="/logout" method="POST">
            <button type="submit">Log out</button>
        </form>
    </div>
</section>

<script src="/js/adminscript.js"></script>
</body>
</html>
